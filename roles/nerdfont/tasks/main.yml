- name: Create download folder
  file:
    state: directory
    path: /opt/nerdfont
    mode: u=rwX,go=rX

- name: Create fonts folder
  file:
    state: directory
    path: "{{ HOME }}/.local/share/fonts"
    mode: u=rwX,go=rX

- name: Download Nerdfont
  get_url:
    url: https://github.com/ryanoasis/nerd-fonts/releases/download/v3.4.0/UbuntuMono.tar.xz
    dest: /opt/nerdfont/UbuntuMono_v3.4.0.tar.xz
    checksum: sha512:455da63dc9c956dd454e3ca5c2390bf67e464902cebee54c0541d1f54336147ae49d82988f79d733e477e26c975edef1a7fbae80df4afd9921d0325ff5c28c4d
    mode: u=rw,go=r

- name: Extract Nerdfont
  unarchive:
    src: /opt/nerdfont/UbuntuMono_v3.4.0.tar.xz
    dest: "{{ HOME }}/.local/share/fonts/"
    creates: "{{ HOME }}/.local/share/fonts/UbuntuMonoNerdFontMono-Regular.ttf"
  register: extract_nerdfont

- name: Update font change
  when: extract_nerdfont.changed
  become: true
  become_user: "{{ USER }}"
  command: fc-cache -fv

