- name: Install the rootless Docker
  command:
    cmd: dockerd-rootless-setuptool.sh install
    creates: ~/.config/systemd/user/docker.service
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ UID }}"

- name: Start Docker service
  systemd:
    scope: user
    name: docker
    state: started
    enabled: true
    daemon_reload: true
