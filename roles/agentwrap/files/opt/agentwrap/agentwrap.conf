HOST_VETH_NAME=awhost0
NS_VETH_NAME=awns0

HOST_VETH_ADDR_CIDR=169.254.100.1/30
NS_VETH_ADDR_CIDR=169.254.100.2/30
NS_GATEWAY_ADDR=169.254.100.1

# NOTE: these are hardcoded in /usr/local/bin/agentwrap-root for security
NETNS_NAME=agentwrap-egress
NETNS_PATH=/run/netns/agentwrap-egress

AGENTWRAP_PATH="$HOME/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$HOME/.npm-global/bin"

EXTRA_RW_DIRS=(
    "$HOME/.cache/opencode"
    "$HOME/.local/share/opencode"
    "$HOME/.local/state/opencode"
    "$HOME/.config/opencode"
    "$HOME/.codex"
)

EXTRA_RO_DIRS=(
    "$HOME/git"
    "$HOME/.npm-global"
    "$HOME/.dotfiles/opencode"
    "$HOME/.local/share/pipx"
    "$HOME/.config/black"
    "$HOME/.config/pylintrc"
)

# Workspace-root entries that should remain read-only when the workspace itself
# is rebound writable. Only existing paths are carved out to keep startup cheap.
WORKSPACE_ROOT_RO_CARVEOUTS=(
    .git
    .codex
    .agents
    .claude
)

PASSTHROUGH_ENV_VARS=(
    HOME
    PWD
    USER
    LOGNAME
    SHELL
    COLORTERM
    LANG
    TERM
    TERMINFO
    TERM_PROGRAM
    TERM_PROGRAM_VERSION
)

# Vars that may cross the sudo/unroot boundary for setup work, but should not be
# passed through to the final sandbox unless they are also in PASSTHROUGH_ENV_VARS
SUDO_WRAP_ENV_VARS=(
    AWS_PROFILE
)
